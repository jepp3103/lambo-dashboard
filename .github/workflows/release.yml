name: Build release binary

# Builds the code-only binary (no proprietary assets bundled) and attaches
# it to the GitHub Release whenever a version tag is pushed, e.g.:
#   git tag v1.0.0 && git push --tags

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    # Use an older Ubuntu image so the resulting binary's glibc requirement
    # stays low, giving it a shot at running on a wide range of distros.
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyserial pillow psutil numpy pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --add-data "res:res" --add-data "library:library" \
            --name lambo-dashboard lambo_dashboard.py

      - name: Package release assets
        run: |
          mkdir -p out
          cp dist/lambo-dashboard out/
          cp packaging/99-lambo-dashboard.rules out/
          cp packaging/lambo-dashboard.service out/
          cp packaging/install.sh out/
          cp packaging/detect.sh out/
          tar -czf lambo-dashboard-linux-x86_64.tar.gz -C out .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: lambo-dashboard-linux-x86_64.tar.gz
