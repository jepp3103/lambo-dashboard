name: Build release binary

# Builds the binary (with dashboard assets baked in) and attaches it to the
# GitHub Release whenever a version tag is pushed, e.g.:
#   git tag v1.0.1 && git push --tags

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required for softprops/action-gh-release to create releases

jobs:
  build:
    # ubuntu-22.04 is the oldest currently-supported GitHub-hosted runner
    # (ubuntu-20.04 was fully removed April 2025) -- keeps the glibc
    # requirement of the built binary as low as reasonably possible.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyserial pillow psutil numpy pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --add-data "res:res" --add-data "library:library" \
            --name lambo-dashboard lambo_dashboard.py

      - name: Package release assets
        run: |
          mkdir -p out/lambo-dashboard-linux-x86_64
          cp dist/lambo-dashboard out/lambo-dashboard-linux-x86_64/
          cp packaging/99-lambo-dashboard.rules out/lambo-dashboard-linux-x86_64/
          cp packaging/lambo-dashboard.service out/lambo-dashboard-linux-x86_64/
          cp packaging/install.sh out/lambo-dashboard-linux-x86_64/
          cp packaging/detect.sh out/lambo-dashboard-linux-x86_64/
          tar -czf lambo-dashboard-linux-x86_64.tar.gz -C out lambo-dashboard-linux-x86_64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: lambo-dashboard-linux-x86_64.tar.gz
